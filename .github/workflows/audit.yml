name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 06:00 UTC — catches advisories published after merge.
    - cron: "0 6 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
